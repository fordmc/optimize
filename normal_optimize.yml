# Normal Optimization Profile
# Values to apply across various config files.
# Corresponding files: server.properties, bukkit.yml, spigot.yml, paper-world-defaults.yml, purpur.yml

server.properties:
  network-compression-threshold: 256

spigot.yml:
  merge-radius:
    item: 2.5
    exp: 3.0
  hopper-transfer: 8
  hopper-check: 1
  nerf-spawner-mobs: true

paper-world-defaults.yml:
  treasure-maps-return-already-discovered: true
  disable-chest-cat-detection: true

purpur.yml:
  disable-treasure-searching: true
